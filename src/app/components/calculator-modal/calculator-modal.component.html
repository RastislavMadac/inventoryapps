<ion-content class="ion-padding">
  <div class="centered-content">
  
    <div class="info-section">
      <div class="product-header" *ngIf="nazovProduktu">
        {{ nazovProduktu }}
        <span style="font-weight: normal; opacity: 0.7;">({{ jednotka }})</span>
      </div>

     

      <div class="display-container">
        <div class="formula-text" *ngIf="zobrazitDetail">
          {{ fullFormula }}
        </div>
        <div class="calculation-text" [class.has-detail]="zobrazitDetail">
          {{ mainDisplay }}
        </div>
      </div>

      <div class="balenie-btn-container" style="display: flex; gap: 8px;">
        
        <ion-button *ngIf="balenie !== 1 && balenie > 0" expand="block" color="warning" class="ion-margin-bottom" (click)="pridatBalenie()" style="flex: 1;">
          <ion-icon name="cube-outline" slot="start"></ion-icon>
          <strong>Balenie (x{{ balenie }})</strong>
        </ion-button>

        <ion-button *ngIf="!balenie || balenie === 1" expand="block" fill="outline" color="medium" class="ion-margin-bottom" (click)="zmenitVelkostBalenia()" style="flex: 1;">
          <ion-icon name="add-circle-outline" slot="start"></ion-icon>
          Pridať balenie
        </ion-button>

        <ion-button *ngIf="balenie !== 1 && balenie > 0" color="light" class="ion-margin-bottom" (click)="zmenitVelkostBalenia()">
          <ion-icon slot="icon-only" name="create-outline"></ion-icon>
        </ion-button>
        
      </div>
    </div> 
    <div class="keypad-section">
      <div class="keypad">
        <div class="row">
          <ion-button color="danger" (click)="vymazat()">C</ion-button>
          <ion-button color="medium" (click)="zmazatJeden()">⌫</ion-button>
          <ion-button color="secondary" (click)="stlacene('/')">÷</ion-button>
          <ion-button color="secondary" (click)="stlacene('*')">×</ion-button>
        </div>
    
        <div class="row">
          <ion-button color="light" (click)="stlacene('7')">7</ion-button>
          <ion-button color="light" (click)="stlacene('8')">8</ion-button>
          <ion-button color="light" (click)="stlacene('9')">9</ion-button>
          <ion-button color="secondary" (click)="stlacene('-')">−</ion-button>
        </div>
    
        <div class="row">
          <ion-button color="light" (click)="stlacene('4')">4</ion-button>
          <ion-button color="light" (click)="stlacene('5')">5</ion-button>
          <ion-button color="light" (click)="stlacene('6')">6</ion-button>
          <ion-button color="secondary" (click)="stlacene('+')">+</ion-button>
        </div>
    
        <div class="row">
          <ion-button color="light" (click)="stlacene('1')">1</ion-button>
          <ion-button color="light" (click)="stlacene('2')">2</ion-button>
          <ion-button color="light" (click)="stlacene('3')">3</ion-button>
          <ion-button color="tertiary" (click)="vypocitat()">=</ion-button>
        </div>
    
        <div class="row bottom-row">
          <ion-button color="light" (click)="stlacene('0')">0</ion-button>
          <ion-button color="light" (click)="stlacene('.')">.</ion-button>
          <ion-button class="wide-btn" color="success" (click)="potvrdit()">OK</ion-button>
        </div>
      </div>
    </div>
    </div>
</ion-content>
